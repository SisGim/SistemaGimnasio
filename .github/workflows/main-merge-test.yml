name: Java Compile and Test

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Configurar Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Compilar código fuente
      run: |
        mkdir -p out
        find src/main/java -name "*.java" > sources.txt
        javac -d out @sources.txt

    - name: Compilar pruebas
      run: |
        mkdir -p test-out
        find src/test/java -name "*.java" > test-sources.txt
        javac -cp out:libs/junit-platform-console-standalone-1.10.0.jar -d test-out @test-sources.txt

    - name: Ejecutar pruebas
      run: |
        java -jar libs/junit-platform-console-standalone-1.10.0.jar \
          --class-path out:test-out \
          --scan-class-path \
          --reports-dir test-reports

    - name: Subir reporte de pruebas
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: junit-test-report
        path: test-reports
